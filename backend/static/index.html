<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球金融大數據量化終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Noto+Sans+TC:wght@400;700&display=swap');
        :root { --neon-green: #00ff41; --neon-blue: #00d2ff; --neon-purple: #bc13fe; --dark-bg: #050505; --panel-bg: #111111; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--dark-bg); color: #e2e8f0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .panel { background: var(--panel-bg); border: 1px solid #222; border-radius: 4px; }
        .terminal-green { color: var(--neon-green); text-shadow: 0 0 5px rgba(0, 255, 65, 0.5); }
        .terminal-blue { color: var(--neon-blue); text-shadow: 0 0 5px rgba(0, 210, 255, 0.5); }
        .terminal-purple { color: var(--neon-purple); text-shadow: 0 0 5px rgba(188, 19, 254, 0.5); }
        
        .ticker-container { background: #000; border-bottom: 1px solid #333; height: 50px; overflow: hidden; display: flex; align-items: center; width: 100%; position: relative; }
        .ticker-track { display: flex; align-items: center; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .ticker-item { width: 12vw; flex-shrink: 0; padding: 0 12px; font-size: 13px; white-space: nowrap; overflow: hidden; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid #222; }

        .tab-active { border-bottom: 3px solid var(--neon-blue); color: var(--neon-blue); }
        .subtab-active { background: #222; color: var(--neon-blue); border: 1px solid #444; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; }
        
        .corr-cell { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border: 1px solid #111; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <div class="ticker-container">
        <div class="ticker-track" id="track-1">
            <div class="ticker-item mono text-zinc-500 italic" style="width:100vw">大數據管線初始化中...</div>
        </div>
    </div>

    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/20">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold tracking-tighter terminal-blue flex items-center gap-2">
                <i data-lucide="zap" class="w-8 h-8"></i> 量化宏觀終端 <span class="text-xs terminal-purple mono">v3.5 QUANT</span>
            </h1>
            <div class="px-3 py-1 border border-green-500/30 text-xs terminal-green bg-green-500/5 mono rounded">QUANT ENGINE: READY</div>
        </div>
        <div class="flex items-center gap-6 mono text-sm text-zinc-500">
            <button onclick="toggleMacroHub()" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded font-bold flex items-center gap-2 transition-colors">
                <i data-lucide="globe"></i> 國家總經概觀
            </button>
            <div>流動性相關性: <span id="corr-val" class="terminal-purple">--</span></div>
            <div>NEXT SYNC: <span id="refresh-timer" class="text-zinc-300">60s</span></div>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 gap-2 p-2 overflow-hidden">
        <!-- Left Pane: Assets -->
        <div class="col-span-12 lg:col-span-3 flex flex-col gap-2 h-full overflow-hidden">
            <div class="p-3 panel flex-1 overflow-y-auto flex flex-col">
                <h2 class="text-sm font-bold text-zinc-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                    <i data-lucide="database" class="w-5 h-5"></i> 全球全維度監控
                </h2>
                <div class="flex gap-2 mb-3 border-b border-zinc-800 pb-3 overflow-x-auto">
                    <button onclick="switchCategory('股市')" class="cat-btn text-xs px-2 py-1 rounded bg-zinc-800 text-white font-bold" id="cat-股市">股市</button>
                    <button onclick="switchCategory('期匯')" class="cat-btn text-xs px-2 py-1 rounded text-zinc-500 hover:text-white font-bold" id="cat-期匯">期匯</button>
                    <button onclick="switchCategory('數字貨幣')" class="cat-btn text-xs px-2 py-1 rounded text-zinc-500 hover:text-white font-bold" id="cat-數字貨幣">數字貨幣</button>
                    <button onclick="switchCategory('宏觀')" class="cat-btn text-xs px-2 py-1 rounded text-zinc-500 hover:text-purple-400 font-bold" id="cat-宏觀">宏觀</button>
                </div>
                <div id="live-monitor-container" class="flex-1 flex flex-col border border-zinc-800/50 rounded overflow-y-auto"></div>
            </div>
            <div class="p-4 panel h-40 flex flex-col justify-center bg-zinc-900/10">
                <h2 class="text-xs font-bold text-zinc-500 uppercase mb-2 flex justify-between">
                    <span id="flow-title">資金/籌碼流向</span>
                    <span id="flow-date" class="text-[9px] text-zinc-600">--</span>
                </h2>
                <div class="flex-1">
                    <canvas id="flow-chart"></canvas>
                </div>
            </div>
        </div>

        <!-- Center Pane: Analysis -->
        <div class="col-span-12 lg:col-span-9 flex flex-col gap-2 h-full overflow-hidden">
            <div class="panel flex-1 flex flex-col overflow-hidden">
                <div class="p-3 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                    <div class="flex items-center gap-6">
                        <select id="asset-selector" class="bg-zinc-800 text-white text-lg font-bold py-1.5 px-4 rounded border border-zinc-700 focus:outline-none min-w-[200px]">
                        </select>
                        <div id="quant-advice" class="text-sm font-bold mono px-3 py-1 bg-zinc-800/50 rounded border border-zinc-700 hidden"></div>
                        <div class="flex bg-zinc-900 rounded p-1">
                            <button onclick="switchView('chart')" class="subtab-btn subtab-active text-xs px-4 py-1 rounded font-bold" id="tab-chart">技術圖表</button>
                            <button onclick="switchView('corr')" class="subtab-btn text-xs px-4 py-1 rounded text-zinc-500 font-bold" id="tab-corr">相關性矩陣</button>
                        </div>
                    </div>
                    <div class="flex gap-4 mono" id="timeframe-group">
                        <button onclick="switchTimeframe('daily')" class="tf-btn tab-active text-base font-bold pb-1 text-white" id="btn-daily">日線</button>
                        <button onclick="switchTimeframe('weekly')" class="tf-btn text-base font-bold pb-1 text-zinc-500" id="btn-weekly">週線</button>
                        <button onclick="switchTimeframe('monthly')" class="tf-btn text-base font-bold pb-1 text-zinc-500" id="btn-monthly">月線</button>
                    </div>
                </div>
                
                <div class="flex-1 p-4 relative overflow-hidden flex flex-col gap-2">
                    <div id="chart-view" class="flex-1 flex flex-col gap-2 h-full">
                        <div class="flex-[2] relative">
                            <canvas id="main-chart"></canvas>
                        </div>
                        <div class="flex-1 grid grid-cols-2 gap-2">
                            <div class="panel bg-black/40 p-2 relative">
                                <h3 class="text-[10px] font-bold text-zinc-500 absolute top-2 left-2 uppercase">RSI (14)</h3>
                                <canvas id="rsi-chart"></canvas>
                            </div>
                            <div class="panel bg-black/40 p-2 relative">
                                <h3 class="text-[10px] font-bold text-zinc-500 absolute top-2 left-2 uppercase">MACD</h3>
                                <canvas id="macd-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    
                    <div id="corr-view" class="hidden flex-1 flex flex-col items-center justify-center bg-zinc-950 p-8">
                        <h2 class="text-xl font-bold mb-8 terminal-blue uppercase tracking-widest italic">跨市場資產相關性矩陣 (180D)</h2>
                        <div id="corr-matrix" class="flex flex-col border border-zinc-800 p-4 rounded bg-zinc-900/20">
                            <!-- Matrix populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="h-32 panel p-3 bg-black flex flex-col overflow-hidden">
                <div class="text-xs text-zinc-600 uppercase mb-1 flex items-center gap-1 font-bold">
                    <i data-lucide="list" class="w-4 h-4"></i> 量化日誌 (QUANT ENGINE LOG)
                </div>
                <div id="log-feed" class="flex-1 mono text-xs text-zinc-500 overflow-y-auto"></div>
            </div>
        </div>
    </main>

    <!-- Macro Hub Overlay -->
    <div id="macro-hub" class="fixed inset-0 bg-black/95 z-50 hidden flex flex-col p-6 overflow-hidden">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-8">
                <h2 class="text-3xl font-black terminal-blue tracking-tighter italic flex items-center gap-3">
                    <i data-lucide="globe-2" class="w-10 h-10"></i> GLOBAL MACRO HUB
                </h2>
                <div class="flex gap-4" id="country-selector">
                    <button onclick="switchMacroCountry('美國')" class="country-btn px-6 py-2 rounded-full border border-zinc-700 font-bold bg-blue-600 text-white" id="m-美國">美國</button>
                    <button onclick="switchMacroCountry('台灣')" class="country-btn px-6 py-2 rounded-full border border-zinc-700 font-bold text-zinc-400 hover:text-white" id="m-台灣">台灣</button>
                    <button onclick="switchMacroCountry('日本')" class="country-btn px-6 py-2 rounded-full border border-zinc-700 font-bold text-zinc-400 hover:text-white" id="m-日本">日本</button>
                    <button onclick="switchMacroCountry('新加坡')" class="country-btn px-6 py-2 rounded-full border border-zinc-700 font-bold text-zinc-400 hover:text-white" id="m-新加坡">新加坡</button>
                </div>
            </div>
            <button onclick="toggleMacroHub()" class="text-zinc-500 hover:text-white flex items-center gap-2 font-bold uppercase tracking-widest text-sm bg-zinc-800/50 px-4 py-2 rounded border border-zinc-700">
                CLOSE [ESC] <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div id="macro-grid" class="flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 overflow-y-auto pr-2 pb-10">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentAsset = '台股加權', currentTimeframe = 'daily', currentCategory = '股市', currentView = 'chart';
        let globalData = null, mainChart = null, rsiChart = null, macdChart = null, flowChart = null;
        let tickerTimer = null, tickerIndex = 0, currentMacroCountry = '美國';

        async function toggleMacroHub() {
            const hub = document.getElementById('macro-hub');
            hub.classList.toggle('hidden');
            if (!hub.classList.contains('hidden')) {
                fetchMacroDashboard();
            }
        }

        async function switchMacroCountry(country) {
            currentMacroCountry = country;
            document.querySelectorAll('.country-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white');
                b.classList.add('text-zinc-400');
            });
            document.getElementById(`m-${country}`).className = "country-btn px-6 py-2 rounded-full border border-zinc-700 font-bold bg-blue-600 text-white";
            fetchMacroDashboard();
        }

        async function fetchMacroDashboard() {
            const grid = document.getElementById('macro-grid');
            grid.innerHTML = '<div class="col-span-full py-20 text-center mono text-zinc-500 italic text-2xl animate-pulse">正在同步實時總經矩陣數據...</div>';
            try {
                const res = await fetch(`/api/macro/dashboard?country=${currentMacroCountry}`);
                const data = await res.json();
                renderMacroDashboard(data);
            } catch (e) { grid.innerHTML = '數據同步失敗'; }
        }

        function renderMacroDashboard(data) {
            const grid = document.getElementById('macro-grid');
            grid.innerHTML = '';
            
            const categoryLabels = {
                "Growth": "經濟成長 (Growth)", "Inflation": "通膨物價 (Inflation)",
                "Liquidity": "資金流動性 (Liquidity)", "Rates": "利率水準 (Rates)",
                "Labor": "勞動力市場 (Labor)", "FX": "匯率走勢 (FX)", "Asset": "資產市場 (Asset Market)"
            };

            Object.entries(data).forEach(([cat, indicators]) => {
                if (indicators.length === 0) return;
                
                const card = document.createElement('div');
                card.className = "panel p-5 bg-zinc-900/30 flex flex-col gap-4 border-zinc-800 hover:border-zinc-700 transition-all";
                card.innerHTML = `<h3 class="text-sm font-black terminal-purple uppercase tracking-widest border-b border-zinc-800 pb-2">${categoryLabels[cat] || cat}</h3>`;
                
                const indList = document.createElement('div');
                indList.className = "flex flex-col gap-6";
                
                indicators.forEach((ind, idx) => {
                    const row = document.createElement('div');
                    row.className = "flex flex-col gap-2";
                    const color = ind.pct >= 0 ? 'terminal-green' : 'text-red-500';
                    row.innerHTML = `
                        <div class="flex justify-between items-end">
                            <span class="text-zinc-400 font-bold text-xs uppercase">${ind.name}</span>
                            <div class="flex flex-col items-end">
                                <span class="text-xl font-black mono text-white">${ind.val}</span>
                                <span class="text-[10px] font-bold mono ${color}">${ind.pct > 0 ? '+' : ''}${ind.pct}%</span>
                            </div>
                        </div>
                        <div class="h-10 w-full relative">
                            <canvas id="spark-${cat}-${idx}"></canvas>
                        </div>
                    `;
                    indList.appendChild(row);
                });
                
                card.appendChild(indList);
                grid.appendChild(card);
                
                // Render Sparklines
                setTimeout(() => {
                    indicators.forEach((ind, idx) => {
                        const ctx = document.getElementById(`spark-${cat}-${idx}`).getContext('2d');
                        new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: ind.series.map(p => p.t),
                                datasets: [{
                                    data: ind.series.map(p => p.v),
                                    borderColor: ind.pct >= 0 ? '#00ff41' : '#ef4444',
                                    borderWidth: 2, fill: false, pointRadius: 0, tension: 0.4
                                }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
                        });
                    });
                }, 10);
            });
        }

        const SYMBOLS = {
            "股市": { "台股加權": "^TWII", "納斯達克": "^IXIC", "標普500": "^GSPC", "日經225": "^N225", "德國DAX": "^GDAXI", "印度NIFTY": "^NSEI", "澳洲ASX": "^AXJO", "新加坡STI": "^STI" },
            "期匯": { "美元指數": "DX-Y.NYB", "美債10Y": "^TNX", "台幣匯率": "TWD=X" },
            "數字貨幣": { "比特幣": "BTC-USD", "以太幣": "ETH-USD" }
        };

        async function fetchData() {
            try {
                const res = await fetch('/api/terminal');
                const data = await res.json();
                const isFirst = !globalData;
                globalData = data;
                if (isFirst) renderInitialUI();
                else updateUI();
            } catch (e) { console.error(e); }
        }

        async function fetchInstitutional() {
            try {
                const asset = globalData.indices[currentAsset];
                if (!asset || asset.is_macro) return;
                const titleEl = document.getElementById('flow-title');
                titleEl.innerText = `${currentAsset} 資金流向`;
                const res = await fetch(`/api/institutional?name=${currentAsset}&symbol=${SYMBOLS[currentCategory]?.[currentAsset] || ''}`);
                const result = await res.json();
                renderFlowChart(result);
            } catch (e) {}
        }

        async function fetchCorrelation() {
            try {
                const res = await fetch('/api/correlation');
                const data = await res.json();
                renderCorrelation(data);
            } catch (e) {}
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.subtab-btn').forEach(b => { b.classList.remove('subtab-active'); b.classList.add('text-zinc-500'); });
            document.getElementById(`tab-${view}`).classList.add('subtab-active');
            document.getElementById(`tab-${view}`).classList.remove('text-zinc-500');
            document.getElementById('chart-view').classList.toggle('hidden', view !== 'chart');
            document.getElementById('corr-view').classList.toggle('hidden', view !== 'corr');
            if (view === 'corr') fetchCorrelation();
            else updateMainChart(true);
        }

        function renderCorrelation(data) {
            const container = document.getElementById('corr-matrix');
            const keys = Object.keys(data);
            let html = '<div class="flex"><div class="corr-cell border-none"></div>' + keys.map(k => `<div class="corr-cell text-zinc-400 font-bold">${k}</div>`).join('') + '</div>';
            keys.forEach(rowKey => {
                html += `<div class="flex"><div class="corr-cell text-zinc-400 font-bold">${rowKey}</div>`;
                keys.forEach(colKey => {
                    const val = data[rowKey][colKey];
                    const opacity = Math.abs(val);
                    const color = val > 0 ? `rgba(0, 255, 65, ${opacity})` : `rgba(239, 68, 68, ${opacity})`;
                    html += `<div class="corr-cell" style="background: ${color}; color: ${opacity > 0.5 ? '#000' : '#fff'}">${val}</div>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function renderFlowChart(res) {
            const ctx = document.getElementById('flow-chart').getContext('2d');
            if (flowChart) flowChart.destroy();
            const data = res.data;
            if (!data) return;
            const labels = Object.values(data)[0].map(p => p.t.slice(5));
            const datasets = [];
            const colors = {'外資': '#00ff41', '投信': '#00d2ff', '自營商': '#bc13fe', '資金淨流': '#00d2ff'};
            Object.entries(data).forEach(([label, series]) => {
                datasets.push({ label, data: series.map(p => p.v), backgroundColor: colors[label] || '#555', borderRadius: 2 });
            });
            flowChart = new Chart(ctx, {
                type: 'bar', data: { labels, datasets },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
            });
        }

        function renderInitialUI() {
            const indices = Object.entries(globalData.indices);
            setupTicker(indices);
            const selector = document.getElementById('asset-selector');
            selector.innerHTML = indices.map(([name, v]) => `<option value="${name}">${v.is_macro ? '● ' : ''}${name}</option>`).join('');
            selector.value = currentAsset;
            updateUI();
        }

        function updateUI() {
            document.getElementById('corr-val').innerText = globalData.quant.liquidity_correlation;
            document.getElementById('log-feed').innerHTML = globalData.logs.map(log => `<div class="mb-0.5">${log}</div>`).join('');
            const assetData = globalData.indices[currentAsset];
            const adviceEl = document.getElementById('quant-advice');
            if (assetData && assetData.advice && !assetData.is_macro) {
                adviceEl.innerText = assetData.advice;
                adviceEl.className = `text-sm font-bold mono px-3 py-1 bg-zinc-800/50 rounded border border-zinc-700 ${assetData.advice_color || 'text-zinc-500'}`;
                adviceEl.classList.remove('hidden');
            } else { adviceEl.classList.add('hidden'); }
            renderLiveMonitor();
            updateMainChart(false);
            fetchInstitutional();
        }

        function setupTicker(allItems) {
            const track = document.getElementById('track-1');
            const items = allItems.filter(([_, v]) => !v.is_macro);
            const html = items.map(([k, v]) => `<div class="ticker-item mono"><span class="text-zinc-500 font-bold truncate">${k}</span><div class="flex justify-between mt-0.5"><span class="font-bold">${v.current.toLocaleString()}</span><span class="${v.change >= 0 ? 'terminal-green' : 'text-red-500'} font-bold text-[9px]">[${v.pct}%]</span></div></div>`).join('');
            track.innerHTML = html + html;
            if (tickerTimer) clearInterval(tickerTimer);
            tickerIndex = 0;
            tickerTimer = setInterval(() => {
                tickerIndex++;
                track.style.transition = 'transform 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                track.style.transform = `translateX(-${tickerIndex * 12}vw)`;
                if (tickerIndex >= items.length) { setTimeout(() => { track.style.transition = 'none'; tickerIndex = 0; track.style.transform = 'translateX(0vw)'; }, 800); }
            }, 4000);
        }

        function switchCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => { b.classList.remove('bg-zinc-800', 'text-white'); b.classList.add('text-zinc-500'); });
            document.getElementById(`cat-${cat}`).className = "cat-btn text-xs px-2 py-1 rounded bg-zinc-800 text-white font-bold";
            renderLiveMonitor();
        }

        function renderLiveMonitor() {
            const container = document.getElementById('live-monitor-container');
            container.innerHTML = '';
            let displayIndex = 0;
            Object.entries(globalData.indices).forEach(([name, v]) => {
                if (v.category !== currentCategory) return;
                const div = document.createElement('div');
                const active = currentAsset === name ? 'ring-1 ring-blue-500 bg-zinc-800' : '';
                div.className = `flex items-center justify-between py-3 px-4 ${displayIndex % 2 === 0 ? 'bg-zinc-900/60' : ''} ${active} hover:bg-zinc-700/50 cursor-pointer transition-colors`;
                div.onclick = () => { currentAsset = name; document.getElementById('asset-selector').value = name; updateUI(); };
                const valColor = v.is_macro ? 'terminal-purple' : (v.change >= 0 ? 'terminal-green' : 'text-red-500');
                div.innerHTML = `<div class="flex flex-col"><span class="text-base font-bold text-zinc-300 mb-0.5">${name}</span><span class="text-lg font-bold mono ${valColor}">${v.is_macro ? v.current + v.unit : v.current.toLocaleString()}</span></div><div class="text-base font-bold mono ${valColor}">${v.is_macro ? '趨勢: ' + v.trend : v.pct + '%'}</div>`;
                container.appendChild(div);
                displayIndex++;
            });
        }

        function updateMainChart(withAnim = false) {
            const data = globalData.indices[currentAsset];
            if (!data) return;
            const series = data.series[currentTimeframe] || data.series['daily'];
            const color = data.is_macro ? '#bc13fe' : '#00d2ff';
            const ctx = document.getElementById('main-chart').getContext('2d');
            if (mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'line',
                data: { labels: series.map(p => p.t), datasets: [{ label: currentAsset, data: series.map(p => p.v), borderColor: color, borderWidth: 3, fill: true, backgroundColor: color + '15', tension: 0.3, pointRadius: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, animation: { duration: withAnim ? 400 : 0 }, interaction: { intersect: false, mode: 'index' }, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#1a1a1a' }, ticks: { color: '#aaa', font: { weight: 'bold' } } } } }
            });
            const rsiCtx = document.getElementById('rsi-chart').getContext('2d');
            if (rsiChart) rsiChart.destroy();
            rsiChart = new Chart(rsiCtx, {
                type: 'line',
                data: { labels: series.map(p => p.t), datasets: [{ data: series.map(p => p.rsi), borderColor: '#f59e0b', borderWidth: 2, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { min: 20, max: 80, grid: { color: '#222' }, ticks: { size: 8, color: '#666' } } } }
            });
            const macdCtx = document.getElementById('macd-chart').getContext('2d');
            if (macdChart) macdChart.destroy();
            macdChart = new Chart(macdCtx, {
                type: 'bar',
                data: { labels: series.map(p => p.t), datasets: [{ data: series.map(p => p.macd), backgroundColor: '#00ff41' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#222' }, ticks: { size: 8, color: '#666' } } } }
            });
        }

        function switchTimeframe(tf) {
            currentTimeframe = tf;
            document.querySelectorAll('.tf-btn').forEach(b => { b.classList.remove('tab-active', 'text-white'); b.classList.add('text-zinc-500'); });
            document.getElementById(`btn-${tf}`).className = "tf-btn tab-active text-base font-bold pb-1 text-white";
            updateMainChart(true);
        }

        document.getElementById('asset-selector').onchange = (e) => { currentAsset = e.target.value; updateUI(); };
        setInterval(() => { let timer = document.getElementById('refresh-timer'); let secs = parseInt(timer.innerText) - 1; if (secs <= 0) { fetchData(); secs = 60; } timer.innerText = secs + 's'; }, 1000);
        fetchData();
    </script>
</body>
</html>
