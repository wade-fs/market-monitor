<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>總體經濟情報平台 v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-950 text-white h-screen flex flex-col overflow-hidden font-sans">
    <header class="h-14 border-b border-zinc-800 flex justify-between items-center px-6 bg-black">
        <h1 class="text-xl font-black text-blue-500 tracking-tighter">MACRO<span class="text-zinc-500">v4.0</span></h1>
        <div class="flex gap-4">
            <button onclick="switchView('overview')" class="nav-btn active" id="nav-overview">全球總經概觀</button>
            <button onclick="switchView('country')" class="nav-btn" id="nav-country">國家經濟儀表板</button>
            <button onclick="switchView('market')" class="nav-btn" id="nav-market">市場行情監控</button>
            <button onclick="switchView('stocks')" class="nav-btn" id="nav-stocks">個股財報估值</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar (Countries/Stocks) -->
        <aside id="left-sidebar" class="w-48 border-r border-zinc-800 bg-zinc-900 hidden flex flex-col">
            <div id="sidebar-content"></div>
        </aside>

        <!-- Dynamic Content Area -->
        <div id="content-area" class="flex-1 overflow-y-auto p-6">
            <!-- Global Overview -->
            <div id="view-overview" class="space-y-6">
                <!-- ... existing overview content ... -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="panel p-4 h-64 flex flex-col">
                        <h3 class="text-sm text-zinc-500 uppercase font-bold mb-2">全球風險評分</h3>
                        <div id="risk-gauge" class="flex-1 w-full h-full"></div>
                    </div>
                    <div class="panel p-4 h-64 flex flex-col">
                        <h3 class="text-sm text-zinc-500 uppercase font-bold mb-2">資金流動性熱力圖</h3>
                        <div id="liquidity-heatmap" class="flex-1 w-full h-full"></div>
                    </div>
                    <div class="panel p-4 h-64 flex flex-col">
                        <h3 class="text-sm text-zinc-500 uppercase font-bold mb-2">通膨壓力熱力圖</h3>
                        <div id="inflation-heatmap" class="flex-1 w-full h-full"></div>
                    </div>
                </div>
                <div class="panel p-4">
                    <h3 class="text-sm text-zinc-500 uppercase font-bold mb-4">主要市場行情</h3>
                    <div id="markets-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                </div>
            </div>

            <!-- Country Dashboard -->
            <div id="view-country" class="hidden">
                <h2 id="country-title" class="text-2xl font-black mb-6 italic">國家概覽</h2>
                <div id="country-indicators" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
            </div>

            <!-- Market Terminal -->
            <div id="view-market" class="hidden h-full flex flex-col gap-6">
                <div class="panel p-6 flex-1 flex flex-col overflow-hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h2 id="market-title" class="text-2xl font-black italic">市場行情</h2>
                        <div class="text-xs text-zinc-500 mono" id="market-update-time">SYNC: --</div>
                    </div>
                    <div class="flex-1 relative">
                        <div id="market-chart" class="w-full h-full"></div>
                    </div>
                </div>
            </div>

            <!-- Stock Analysis -->
            <div id="view-stocks" class="hidden space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-black italic">個股估值分析 (Top 50/100)</h2>
                    <div class="flex gap-2">
                        <button onclick="loadValuation('TW')" class="px-4 py-1 bg-zinc-800 rounded text-xs font-bold hover:bg-zinc-700">台灣 TWSE50</button>
                        <button onclick="loadValuation('US')" class="px-4 py-1 bg-zinc-800 rounded text-xs font-bold hover:bg-zinc-700">美國 S&P100</button>
                    </div>
                </div>
                <div class="panel overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="border-b border-zinc-800 text-zinc-500 uppercase">
                            <tr>
                                <th class="p-4">代號</th>
                                <th class="p-4">名稱</th>
                                <th class="p-4">本益比 (PE)</th>
                                <th class="p-4">股淨比 (PB)</th>
                                <th class="p-4">殖利率 (%)</th>
                                <th class="p-4">操作</th>
                            </tr>
                        </thead>
                        <tbody id="valuation-table-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- Stock Detail Modal/View -->
            <div id="view-stock-detail" class="hidden space-y-6">
                <button onclick="switchView('stocks')" class="text-blue-500 text-xs font-bold">← 返回列表</button>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-1 panel p-6 space-y-4">
                        <h2 id="stock-detail-name" class="text-3xl font-black">--</h2>
                        <div id="stock-detail-info" class="space-y-2 text-zinc-400 font-bold"></div>
                    </div>
                    <div class="lg:col-span-2 panel p-6">
                        <h3 class="text-sm text-zinc-500 uppercase font-bold mb-4">最近 8 季財報趨勢</h3>
                        <div id="stock-financial-chart" class="h-64 w-full"></div>
                    </div>
                </div>
                <div class="panel p-4 overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead id="financial-table-head" class="border-b border-zinc-800"></thead>
                        <tbody id="financial-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/heatmap.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
