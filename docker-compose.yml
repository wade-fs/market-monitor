version: "3.9"

services:
  backend:
    build: ./backend
    container_name: macro-monitor-v4
    ports:
      - "16888:6666"
    volumes:
      # Docker 外部儲存：./data 掛載到 /data
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - FRED_API_KEY=${FRED_API_KEY}
      - FINMIND_TOKEN=${FINMIND_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6666/api/status"]
      interval: 60s
      timeout: 10s
      retries: 3
